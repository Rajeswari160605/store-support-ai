<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛠️ Engineer Portal - Health & Glow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .glass { backdrop-filter: blur(10px); }
        .ticket-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .ticket-hover:hover { transform: translateY(-8px); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-100 min-h-screen">
    
    <!-- 🔥 NAVIGATION BAR -->
    <nav class="bg-white/80 backdrop-blur-md shadow-xl border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <!-- Logo -->
                <div class="flex items-center space-x-3">
                    <div class="w-14 h-14 bg-gradient-to-br from-emerald-500 to-teal-600 rounded-2xl flex items-center justify-center shadow-lg">
                        <i class="fas fa-wrench text-white text-2xl"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-black bg-gradient-to-r from-gray-900 to-gray-700 bg-clip-text text-transparent">
                            Engineer Portal
                        </h1>
                        <p class="text-sm text-gray-500 font-medium" id="group-name">Loading...</p>
                    </div>
                </div>
                
                <!-- Stats & Actions -->
                <div class="flex items-center space-x-4">
                    <div class="flex items-center space-x-2 bg-red-50 text-red-800 px-4 py-2 rounded-2xl font-semibold">
                        <i class="fas fa-bell text-lg"></i>
                        <span id="live-tickets-count">0</span>
                    </div>
                    <button id="refresh-btn" class="px-6 py-2 bg-blue-600 text-white rounded-2xl hover:bg-blue-700 font-semibold flex items-center space-x-2 shadow-lg">
                        <i class="fas fa-sync-alt"></i>
                        <span>Refresh</span>
                    </button>
                    <div class="w-12 h-12 bg-gradient-to-r from-purple-500 to-pink-500 rounded-2xl flex items-center justify-center text-white font-bold shadow-lg cursor-pointer hover:scale-105 transition-transform">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- 🔥 MAIN CONTENT -->
    <div class="max-w-7xl mx-auto px-6 py-12">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- 🔥 ACTIVE TICKETS -->
            <div class="lg:col-span-2">
                <div class="bg-white/70 glass rounded-3xl shadow-2xl p-8 border border-gray-200">
                    <div class="flex items-center justify-between mb-8">
                        <h2 class="text-3xl font-black text-gray-900 flex items-center">
                            <i class="fas fa-ticket-alt text-amber-500 mr-3 text-2xl"></i>
                            My Active Tickets
                        </h2>
                        <div class="flex items-center space-x-3 text-sm font-semibold">
                            <span class="px-4 py-2 bg-gradient-to-r from-orange-400 to-red-500 text-white rounded-xl shadow-lg">High Priority</span>
                        </div>
                    </div>
                    
                    <div id="tickets-container" class="space-y-4 max-h-[70vh] overflow-y-auto">
                        <!-- TICKETS LOAD HERE -->
                    </div>
                </div>
            </div>

            <!-- 🔥 QUICK ACTIONS & STATUS -->
            <div class="space-y-6">
                <!-- Quick Actions -->
                <div class="bg-gradient-to-br from-emerald-500 to-teal-600 rounded-3xl p-8 text-white shadow-2xl glass">
                    <h3 class="text-2xl font-black mb-6 flex items-center">
                        <i class="fas fa-bolt mr-3"></i>
                        Quick Actions
                    </h3>
                    <div class="space-y-4">
                        <button id="resolve-all" class="w-full bg-white/20 backdrop-blur-sm rounded-2xl p-5 text-left hover:bg-white/30 transition-all group">
                            <div class="flex items-center justify-between">
                                <span class="font-semibold flex items-center">
                                    <i class="fas fa-check-double text-2xl mr-3 group-hover:translate-x-1 transition-transform"></i>
                                    Mark All Resolved
                                </span>
                                <i class="fas fa-arrow-right text-xl"></i>
                            </div>
                        </button>
                        
                        
                        
                    </div>
                </div>

                
            </div>
        </div>
    </div>

    <script>
        let tickets = [];

        // 🔥 LOAD ENGINEER TICKETS
       // 🔥 LOAD ENGINEER TICKETS - FIXED VERSION
async function loadTickets() {
    const token = localStorage.getItem('token');
    console.log('🔑 Token check:', token ? 'OK' : 'MISSING');
    
    if (!token) {
        console.error('❌ NO TOKEN - Relogin!');
        return;
    }
    
    try {
        const headers = {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
        };
        
        const response = await fetch('/api/engineer/tickets', { headers });
        
        if (!response.ok) {
            console.error('API Error:', response.status);
            return;
        }
        
        tickets = await response.json();  // ← THIS WAS MISSING!
        console.log('✅ Tickets loaded:', tickets.length);
        
        document.getElementById('live-tickets-count').textContent = tickets.length;
        document.getElementById('group-name').textContent = 'POS Support Team';
        
        renderTickets();
    } catch (error) {
        console.error('Load tickets error:', error);
    }
}


        function renderTickets() {
            const container = document.getElementById('tickets-container');
            
            if (tickets.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20">
                        <i class="fas fa-ticket text-6xl text-gray-300 mb-4"></i>
                        <h3 class="text-2xl font-bold text-gray-500 mb-2">No Active Tickets</h3>
                        <p class="text-gray-400">You're all caught up! 🎉</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = tickets.map(ticket => `
                <div class="ticket-card ticket-hover bg-gradient-to-r from-white to-blue-50 rounded-2xl p-6 border-2 border-gray-100 shadow-lg group cursor-pointer"
                     data-ticket-id="${ticket.id}">
                   <div class="flex justify-between items-start mb-4">
                       <h4 class="font-bold text-xl text-gray-900 pr-4 flex-1 min-h-[2.5rem]">${ticket.title}</h4>
                       <span class="px-4 py-2 rounded-xl font-bold text-xs shadow-lg ${
                           ticket.priority === 'High' ? 'bg-red-500 text-white' : 
                           ticket.priority === 'Medium' ? 'bg-amber-500 text-white' : 'bg-emerald-500 text-white'
                       }">
                           ${ticket.priority}
                       </span>
                   </div>
                   <p class="text-gray-700 mb-4 leading-relaxed">${ticket.description}</p>
                   <div class="flex items-center justify-between text-sm">
                       <div class="flex items-center space-x-4 text-gray-500">
                           <span><i class="fas fa-store mr-1"></i> Store ${ticket.store_id}</span>
                           <span><i class="fas fa-clock mr-1"></i> ${new Date(ticket.created_at).toLocaleDateString()}</span>
                       </div>
                       <div class="flex space-x-2">
                           <button onclick="updateStatus(${ticket.id}, 'In Progress')" 
                                   class="px-4 py-2 bg-blue-500 text-white rounded-xl text-sm font-semibold hover:bg-blue-600 shadow-md">
                               <i class="fas fa-play mr-1"></i> Progress
                           </button>
                           <button onclick="updateStatus(${ticket.id}, 'Resolved')" 
                                   class="px-4 py-2 bg-emerald-500 text-white rounded-xl text-sm font-semibold hover:bg-emerald-600 shadow-md">
                               <i class="fas fa-check mr-1"></i> Resolve
                           </button>
                       </div>
                   </div>
                </div>
            `).join('');
        }

        // 🔥 UPDATE TICKET STATUS
        async function updateStatus(ticketId, status) {
            try {
                const response = await fetch('/api/engineer/update-status', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ticket_id: ticketId, status})
                });
                
                if (response.ok) {
                    // Remove ticket from list if resolved
                    if (status === 'Resolved') {
                        tickets = tickets.filter(t => t.id != ticketId);
                        renderTickets();
                    }
                    showToast(`Ticket marked as ${status}! ✅`);
                }
            } catch (error) {
                showToast('Update failed!', 'error');
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `fixed top-6 right-6 p-4 rounded-2xl shadow-2xl text-white font-semibold z-50 transform transition-all ${
                type === 'success' ? 'bg-emerald-500' : 'bg-red-500'
            }`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // 🔥 EVENT LISTENERS
        document.getElementById('refresh-btn').onclick = loadTickets;
        document.getElementById('resolve-all').onclick = () => {
            if (confirm('Mark ALL tickets as resolved?')) {
                tickets.forEach(t => updateStatus(t.id, 'Resolved'));
            }
        };

        

        // 🔥 AUTO REFRESH
        loadTickets();
        setInterval(loadTickets, 15000); // 15 seconds
    </script>
</body>
</html>
