<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health & Glow AI - Store Support Sign Up</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/login.css">
  <script src="/static/login.js" defer></script>
</head>
<body>
  <div class="login-container">
    <!-- Logo & Branding -->
    <div class="login-header">
      <div class="logo-circle">
        <i class="fas fa-heart"></i>
      </div>
      <h1>Health & Glow AI</h1>
      <p>Store Support Portal</p>
      <h2 style="margin-top: 8px; color: var(--text-primary);">Create Account</h2>
    </div>

    <!-- Sign Up Form -->
    <form id="signupForm" class="login-form">
      <!-- Error Message -->
      <div id="signupErrorMessage" class="error-message">
        <i class="fas fa-exclamation-circle"></i>
        Something went wrong. Please check your details.
      </div>

      <!-- Name -->
      <div class="input-group">
        <div class="input-wrapper">
          <i class="fas fa-user input-icon"></i>
          <input type="text" id="name" name="name" required placeholder=" ">
          <label for="name" class="floating-label">Full Name</label>
        </div>
      </div>

      <!-- Email -->
      <div class="input-group">
        <div class="input-wrapper">
          <i class="fas fa-envelope input-icon"></i>
          <input type="email" id="signupEmail" name="email" required placeholder=" ">
          <label for="signupEmail" class="floating-label">Email Address</label>
        </div>
      </div>

      <!-- Store ID -->
      <div class="input-group">
        <div class="input-wrapper">
          <i class="fas fa-store input-icon"></i>
          <input type="text" id="storeId" name="storeId" required placeholder=" ">
          <label for="storeId" class="floating-label">Store ID</label>
        </div>
      </div>

      <!-- Role -->
      <!-- Role - COMPLETE REPLACEMENT -->
<div class="input-group">
  <div class="input-wrapper">
    <i class="fas fa-user-tag input-icon"></i>
    <select id="role" name="role" required class="floating-select">
      <option value="" disabled selected>Select Role</option>
      <option value="manager">manager</option>
      <option value="support">Store Support</option>
      <option value="admin">Admin</option>
    </select>
    <label for="role" class="floating-label">Role</label>
  </div>
</div>


      <!-- Password -->
      <div class="input-group">
        <div class="input-wrapper">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" id="signupPassword" name="password" required placeholder=" ">
          <label for="signupPassword" class="floating-label">Password</label>
          <i class="fas fa-eye toggle-password" id="toggleSignupPassword"></i>
        </div>
      </div>

      <!-- Sign Up Button -->
      <button type="submit" id="signupBtn" class="login-button">
        <span class="btn-text" id="signupBtnText">Sign Up</span>
        <div class="loading-spinner" id="signupLoadingSpinner"></div>
      </button>

      <!-- Success Overlay -->
      <div id="signupSuccessOverlay" class="success-overlay">
        <div class="success-card">
          <div class="success-icon">
            <i class="fas fa-check-circle"></i>
          </div>
          <h2 id="signupWelcomeText">Account Created!</h2>
          <p id="signupRedirectText">Redirecting to Login...</p>
          <div class="countdown">
            <span id="signupCountdown">3</span> seconds
          </div>
        </div>
      </div>

      <!-- Link to Login -->
      <div style="margin-top: 16px; text-align: center; font-size: 0.9rem; color: var(--text-secondary);">
        Already have an account?
        <a href="/login" style="color:#fff; text-decoration:underline;">Sign in</a>
      </div>
    </form>

    <!-- Footer -->
    <div class="login-footer">
      <p>&copy; 2026 Health & Glow. Powered by AI Support</p>
    </div>
  </div>
</body>
</html>
